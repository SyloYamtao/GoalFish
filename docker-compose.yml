services:
  postgres:
    image: postgres:16-alpine
    container_name: goalfish-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-goalfish}
      - POSTGRES_USER=${POSTGRES_USER:-goalfish}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-goalfish}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: goalfish-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  neo4j:
    image: neo4j:2026.04.0
    container_name: goalfish-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${GRAPHITI_NEO4J_PASSWORD:-goalfish-graphiti}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
